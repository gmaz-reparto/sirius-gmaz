var MOTS=["Cliente Cerrado","Cliente Sin Dinero","No hizo pedido","Desabasto Producto"];
var MICO=["\uD83D\uDD12","\uD83D\uDCB0","\uD83D\uDCCB","\uD83D\uDCE6"];
var SC={e:"#22c55e",rt:"#ef4444",rp:"#f59e0b"};
var E={};
try{E=JSON.parse(localStorage.getItem(SK)||"{}");} catch(x){E={};}
function sv(){try{localStorage.setItem(SK,JSON.stringify(E));}catch(x){}}
function ck(c){return c.lat+"_"+c.lng+"_"+(c.order||"");}
var _t=sessionStorage.getItem("ts_"+SG);
if(_t&&_t!==TS){sessionStorage.setItem("ts_"+SG,TS);location.reload(true);}
else{sessionStorage.setItem("ts_"+SG,TS);}
var map=L.map("pmap",{zoomControl:false}).setView([D[0].lat,D[0].lng],13);
L.control.zoom({position:"bottomright"}).addTo(map);
L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",{maxZoom:19}).addTo(map);
function mkIcon(order,st){
  var n=order||"",fs=String(n).length>2?8:10;
  var col=(st&&SC[st])?SC[st]:C;
  var svg='<svg xmlns="http://www.w3.org/2000/svg" width="32" height="40" viewBox="0 0 32 42">'
    +'<path d="M16 0C7.163 0 0 7.163 0 16c0 12 16 26 16 26S32 28 32 16C32 7.163 24.837 0 16 0z" fill="'+col+'"/>'
    +'<circle cx="16" cy="16" r="9" fill="rgba(0,0,0,.2)"/>'
    +'<text x="16" y="20.5" text-anchor="middle" font-size="'+fs+'" font-family="monospace" font-weight="700" fill="#fff">'+n+'</text>'
    +'</svg>';
  return L.divIcon({html:svg,iconSize:[32,40],iconAnchor:[16,40],popupAnchor:[0,-44],className:""});
}
var MK=[];
D.forEach(function(c){
  var k=ck(c),st=(E[k]&&E[k].s)?E[k].s:null;
  var m=L.marker([c.lat,c.lng],{icon:mkIcon(c.order,st)});
  m.bindPopup(function(){return buildPopup(c);},{maxWidth:300});
  m.addTo(map);
  MK.push({m:m,d:c,k:k});
});
if(D.length>0){
  var lts=D.map(function(c){return c.lat;}),lns=D.map(function(c){return c.lng;});
  map.fitBounds([[Math.min.apply(null,lts),Math.min.apply(null,lns)],[Math.max.apply(null,lts),Math.max.apply(null,lns)]],{padding:[40,40]});
}
function buildPopup(c){
  var k=ck(c),ed=E[k]||{},st=ed.s||null;
  var stLbl=st==="e"?"\u2713 Entregado":st==="rt"?"\u2717 Rechazo Total":st==="rp"?"\u26A0 Parcial":"";
  var stH=st?('<div class="pst '+st+'">'+stLbl+'</div>'+(ed.m?'<div class="pmot">\uD83D\uDCCC '+ed.m+'</div>':'')):'';
  var exH='';
  if(c.extras&&Object.keys(c.extras).length){
    exH='<div class="px">';
    Object.keys(c.extras).forEach(function(ek){exH+='<div class="pxr"><span class="pxl">'+ek+'</span><span class="pxv">'+c.extras[ek]+'</span></div>';});
    exH+='</div>';
  }
  var h='<div class="pi">';
  h+='<div><span class="pb">Parada '+(c.order||'-')+'</span>'+(c.codigo?'<span class="pc">COD: '+c.codigo+'</span>':'')+'</div>';
  h+='<div class="pn">'+c.name+'</div>';
  h+='<div class="pa">'+(c.addr||'')+'</div>';
  if(c.horario)h+='<div class="ph">\uD83D\uDD50 '+c.horario+'</div>';
  h+='<div class="pax">';
  h+='<a class="pbt pbtn" href="https://maps.google.com/?q='+c.lat+','+c.lng+'" target="_blank">\uD83E\uDDED Navegar</a>';
  if(c.tel)h+='<a class="pbt pbc" href="tel:'+c.tel+'">\uD83D\uDCDE Llamar</a>';
  h+='</div>';
  if(c.notas)h+='<div class="pno">\uD83D\uDCDD '+c.notas+'</div>';
  h+=exH;
  h+='<div class="est"><div class="estt">Resultado de entrega</div>';
  h+=stH;
  h+='<div class="estb">';
  h+='<button class="eb e" onclick="sest(\''+k+'\',\'e\');">\u2713 Entregado</button>';
  h+='<button class="eb rt" onclick="pmot(\''+k+'\',\'rt\');">\u2717 Rechazo</button>';
  h+='<button class="eb rp" onclick="pmot(\''+k+'\',\'rp\');">\u26A0 Parcial</button>';
  h+='</div></div></div>';
  return h;
}
var _mk=null,_ms=null;
function pmot(k,s){
  _mk=k;_ms=s;
  var isTot=s==="rt";
  document.getElementById("mtit").textContent=isTot?"Motivo: Rechazo Total":"Motivo: Rechazo Parcial";
  var cls=isTot?"rt-c":"rp-c";
  var html='';
  MOTS.forEach(function(m,i){html+='<div class="mopt '+cls+'" onclick="selm('+i+')"><span class="mico">'+MICO[i]+'</span>'+m+'</div>';});
  document.getElementById("mopts").innerHTML=html;
  document.getElementById("movl").classList.add("open");
}
function selm(i){
  document.getElementById("movl").classList.remove("open");
  if(_mk!==null)sest(_mk,_ms,MOTS[i]);
  _mk=null;_ms=null;
}
function cmot(){
  document.getElementById("movl").classList.remove("open");
  _mk=null;_ms=null;
}
document.getElementById("movl").addEventListener("click",function(e){if(e.target===this)cmot();});
function sest(k,s,mot){
  var now=new Date().toLocaleTimeString("es-CL");
  E[k]={s:s,h:now,m:mot||""};
  sv();
  var f=MK.find(function(x){return x.k===k;});
  if(f){f.m.setIcon(mkIcon(f.d.order,s));f.m.closePopup();setTimeout(function(){f.m.openPopup();},80);}
  if(document.getElementById("plv").style.display!=="none")rl(D);
  // Publicar gestion en Supabase
  var cd=D.find(function(x){return ck(x)===k;});
  if(cd&&SB_URL&&SB_KEY){
    var payload={fecha:TODAY,ruta:SG,cliente_codigo:cd.codigo||k,cliente_nombre:cd.name,estado:s,motivo:mot||"",hora:now};
    fetch(SB_URL+"/rest/v1/gestiones",{
      method:"POST",
      headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json","Prefer":"resolution=merge-duplicates,return=minimal"},
      body:JSON.stringify(payload)
    }).catch(function(){});
  }
}
function sw(tab){
  document.getElementById("pmap").style.display=tab==="m"?"block":"none";
  document.getElementById("plv").style.display =tab==="l"?"flex" :"none";
  document.getElementById("prv").style.display =tab==="r"?"flex" :"none";
  document.getElementById("tM").className="tab"+(tab==="m"?" on":"");
  document.getElementById("tL").className="tab"+(tab==="l"?" on":"");
  document.getElementById("tR").className="tab"+(tab==="r"?" on":"");
  if(tab==="m")setTimeout(function(){map.invalidateSize();},50);
  if(tab==="r")rpt();
}
function rl(items){
  document.getElementById("cl").innerHTML=items.map(function(c){
    var k=ck(c),ed=E[k]||{},st=ed.s||null;
    var col=(st&&SC[st])?SC[st]:C;
    var stLbl=st==="e"?"\u2713 Entregado":st==="rt"?"\u2717 Rechazo":st==="rp"?"\u26A0 Parcial":"";
    var stFull=stLbl+(ed.m?" \u00b7 "+ed.m:"");
    var h='<div class="ci" onclick="fm('+c.lat+','+c.lng+')">';
    h+='<div class="cn" style="background:'+col+'">'+(c.order||'?')+'</div>';
    h+='<div style="flex:1;min-width:0">';
    h+='<div class="nm">'+c.name+(stFull?'<span class="stbadge '+st+'">'+stFull+'</span>':'')+'</div>';
    h+='<div class="ad">'+(c.addr||'')+'</div>';
    if(c.codigo)h+='<div style="font-family:monospace;font-size:10px;color:#888;margin-top:2px">COD: '+c.codigo+'</div>';
    h+='<div class="ca">';
    h+='<a class="bn" href="https://maps.google.com/?q='+c.lat+','+c.lng+'" target="_blank">\uD83E\uDDED Navegar</a>';
    if(c.tel)h+='<a class="bc" href="tel:'+c.tel+'">\uD83D\uDCDE '+c.tel+'</a>';
    h+='</div>';
    if(c.notas)h+='<div class="nt">\uD83D\uDCDD '+c.notas+'</div>';
    h+='</div></div>';
    return h;
  }).join('');
}
rl(D);
function fl(q){
  var f=q.toLowerCase().trim();
  if(!f){rl(D);return;}
  rl(D.filter(function(c){
    var t=[c.name,c.addr,c.order,c.codigo,c.horario,c.tel,c.notas].map(function(v){return(v||"").toLowerCase();}).join(" ");
    var x=Object.values(c.extras||{}).map(function(v){return(v||"").toLowerCase();}).join(" ");
    return(t+" "+x).indexOf(f)>=0;
  }));
}
function fm(lat,lng){
  sw("m");map.setView([lat,lng],17);
  var f=MK.find(function(x){return x.d.lat===lat&&x.d.lng===lng;});
  if(f)f.m.openPopup();
}
function rpt(){
  var tot=D.length;
  var ne =D.filter(function(c){var e=E[ck(c)];return e&&e.s==="e"; }).length;
  var nrt=D.filter(function(c){var e=E[ck(c)];return e&&e.s==="rt";}).length;
  var nrp=D.filter(function(c){var e=E[ck(c)];return e&&e.s==="rp";}).length;
  var np=tot-ne-nrt-nrp,pct=tot>0?Math.round((ne/tot)*100):0;
  var rs='<div style="background:#fff;border-radius:10px;padding:16px;margin-bottom:16px;border:1px solid #e2ddd5">';
  rs+='<div style="font-size:13px;font-weight:700;margin-bottom:12px">Resumen del d\u00eda</div>';
  rs+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
  rs+='<div style="background:#f0fdf4;border-radius:8px;padding:12px;text-align:center"><div style="font-size:22px;font-weight:800;color:#15803d">'+ne+'</div><div style="font-size:10px;color:#15803d;font-weight:600">ENTREGADOS</div></div>';
  rs+='<div style="background:#fef2f2;border-radius:8px;padding:12px;text-align:center"><div style="font-size:22px;font-weight:800;color:#b91c1c">'+nrt+'</div><div style="font-size:10px;color:#b91c1c;font-weight:600">RECHAZO TOTAL</div></div>';
  rs+='<div style="background:#fffbeb;border-radius:8px;padding:12px;text-align:center"><div style="font-size:22px;font-weight:800;color:#b45309">'+nrp+'</div><div style="font-size:10px;color:#b45309;font-weight:600">RECHAZO PARCIAL</div></div>';
  rs+='<div style="background:#f9fafb;border-radius:8px;padding:12px;text-align:center"><div style="font-size:22px;font-weight:800;color:#6b7280">'+np+'</div><div style="font-size:10px;color:#6b7280;font-weight:600">PENDIENTES</div></div>';
  rs+='</div>';
  rs+='<div style="margin-top:12px;background:#f0f0f0;border-radius:20px;height:8px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:#22c55e;border-radius:20px"></div></div>';
  rs+='<div style="font-size:11px;color:#888;text-align:center;margin-top:4px">'+pct+'% ('+tot+' clientes)</div>';
  rs+='</div>';
  document.getElementById("rs").innerHTML=rs;
  var rows=D.map(function(c){
    var k=ck(c),ed=E[k]||{},st=ed.s||"p";
    var sl=st==="e"?"Entregado":st==="rt"?"Rechazo Total":st==="rp"?"Rechazo Parcial":"Pendiente";
    var bg=st==="e"?"#f0fdf4":st==="rt"?"#fef2f2":st==="rp"?"#fffbeb":"#fff";
    var col=st==="e"?"#15803d":st==="rt"?"#b91c1c":st==="rp"?"#b45309":"#9ca3af";
    var h='<div style="background:'+bg+';border-radius:8px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px">';
    h+='<div style="width:8px;height:8px;border-radius:50%;background:'+col+';flex-shrink:0"></div>';
    h+='<div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+c.name+'</div>';
    if(c.codigo)h+='<div style="font-size:10px;color:#888;font-family:monospace">COD: '+c.codigo+'</div>';
    if(ed.m)h+='<div style="font-size:10px;color:#999;font-style:italic">\uD83D\uDCCC '+ed.m+'</div>';
    h+='</div>';
    h+='<div style="font-size:11px;font-weight:700;color:'+col+';text-align:right;flex-shrink:0">'+sl;
    if(ed.h)h+='<div style="font-size:9px;font-weight:400;color:#aaa">'+ed.h+'</div>';
    h+='</div></div>';
    return h;
  }).join('');
  document.getElementById("rd").innerHTML='<div style="font-size:11px;font-weight:700;color:#8c8680;margin-bottom:8px">DETALLE</div>'+rows;
}
function dlr(){
  var lines=["Cliente,Codigo,Direccion,Orden,Estado,Motivo,Hora"];
  D.forEach(function(c){
    var ed=E[ck(c)]||{};
    var st=ed.s||"";
    var sl=st==="e"?"Entregado":st==="rt"?"Rechazo Total":st==="rp"?"Rechazo Parcial":"Pendiente";
    function q(v){return '"'+String(v||"").replace(/"/g,'""')+'"';}
    lines.push([q(c.name),q(c.codigo),q(c.addr),q(c.order),q(sl),q(ed.m),q(ed.h)].join(","));
  });
  var a=document.createElement("a");
  a.href="data:text/csv;charset=utf-8,\uFEFF"+encodeURIComponent(lines.join("\n"));
  a.download="reporte_"+SG+".csv";
  a.click();
}
</script>
</body>
</html>
